<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32" role="img" aria-label="WebJs">
  <style>
    /* Adapt to the browser tab theme so the mark stays visible on light AND dark
       tab bars (a fixed dark square is invisible on a dark tab). */
    .bg { fill: #1e2226; }
    .fg { stroke: #dee2e6; }
    @media (prefers-color-scheme: dark) {
      .bg { fill: #f0f4f7; }
      .fg { stroke: #1e2226; }
    }
  </style>
  <rect class="bg" width="32" height="32" rx="7"/>
  <path class="fg" d="M8 11.5l4.5 4.5L8 20.5" fill="none" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/>
  <line class="fg" x1="15.5" y1="21.5" x2="23" y2="21.5" stroke-width="2.6" stroke-linecap="round"/>
</svg>
